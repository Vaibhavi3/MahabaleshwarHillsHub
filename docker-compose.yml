version: '3.8'

services:
  postgres:
    image: postgres:13
    container_name: mahabaleshwar_db
    environment:
      POSTGRES_USER: mahabaleshwar_user
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_DB: mahabaleshwar_hub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mahabaleshwar_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mahabaleshwar.com
      PGADMIN_DEFAULT_PASSWORD: admin_password
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - mahabaleshwar_network

volumes:
  postgres_data:

networks:
  mahabaleshwar_network:
    driver: bridge